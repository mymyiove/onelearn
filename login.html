<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>OneLearn 로그인</title><link rel="icon" href="./src/img/Favicon.png"><link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"><link rel="stylesheet" href="./src/css/common.css"><link rel="stylesheet" href="./src/css/auth.css"></head><body><div class="ambient-bg"><span>🎓</span><span>🚀</span><span>🌱</span><span>✨</span></div><main class="auth-shell"><section class="auth-card brand-card"><div id="loginEmoji" class="hero-emoji">🌱</div><h1 id="tenantHeadline">웅진씽크빅<br>OneLearn에 오신 것을<br>환영합니다!</h1><p class="desktop-only">추천 과정과 학습 현황을 한 곳에서 확인하세요.</p><div class="rollup-wrap"><div id="loginRollup">✅ 나에게 필요한 추천 과정을 바로 확인</div></div></section><section class="auth-card login-card"><h2 id="stepTitle">이메일과 비밀번호를 입력해주세요</h2><p id="stepDesc">초기 비밀번호는 안내받은 임시 비밀번호 또는 사번입니다.</p><form id="loginForm" class="stack"><input id="emailInput" type="email" placeholder="이메일" required><input id="passwordInput" type="password" placeholder="비밀번호" required><button class="primary-button" type="submit">로그인</button></form><form id="verifyForm" class="stack hidden"><input id="codeInput" placeholder="인증 코드 123456" required><button class="primary-button" type="submit">인증 완료</button><button id="backToLoginBtn" class="ghost-button" type="button">이전</button></form><form id="passwordForm" class="stack hidden"><input id="newPasswordInput" type="password" placeholder="새 비밀번호 8자 이상" required><input id="newPasswordConfirmInput" type="password" placeholder="새 비밀번호 확인" required><button class="primary-button" type="submit">비밀번호 변경</button></form><button id="forgotToggleBtn" class="link-button forgot-link" type="button">비밀번호를 잊으셨나요?</button><form id="forgotForm" class="forgot-box hidden"><input id="forgotEmailInput" type="email" placeholder="가입 이메일"><button class="
