<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneLearn - 기업 학습 플랫폼</title>
  <link rel="icon" type="image/png" href="./src/img/Favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root {
      --brand: #f47721;
      --brand-dark: #dd5f10;
      --brand-light: #fff1e8;
      --brand-2: #ff9a52;
      --ink: #151515;
      --muted: #667085;
      --muted-2: #9297a5;
      --line: #e9e9f0;
      --line-2: #d9dbe6;
      --bg: #f6f7fb;
      --card: #ffffff;
      --green: #159957;
      --green-soft: #e9f8ef;
      --red: #e65d32;
      --red-soft: #fff0ea;
      --shadow: 0 20px 60px rgba(20, 20, 40, 0.09);
      --shadow-brand: 0 24px 70px rgba(244, 119, 33, 0.16);
      --font: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, rgba(244, 119, 33, 0.16), transparent 30rem),
        radial-gradient(circle at 92% 8%, rgba(255, 154, 82, 0.16), transparent 34rem),
        linear-gradient(180deg, #ffffff 0%, #f8f8fb 36%, var(--bg) 100%);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }

    .page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #ffffff;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    .page-loader.done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      width: min(440px, calc(100% - 32px));
      padding: 36px;
      border: 1px solid var(--line);
      border-radius: 36px;
      background: #ffffff;
      box-shadow: 0 30px 90px rgba(20, 20, 40, 0.14);
      text-align: center;
    }

    .loader-mark {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border-radius: 28px;
      background: var(--brand-light);
      font-size: 38px;
      animation: loaderFloat 1.4s ease-in-out infinite;
    }

    .loader-card h1 { margin: 0 0 8px; font-size: 30px; letter-spacing: -0.045em; }
    .loader-card p { margin: 0 0 22px; color: var(--muted); line-height: 1.65; font-weight: 700; }
    .loader-bar { height: 8px; overflow: hidden; border-radius: 999px; background: #ededf4; }
    .loader-bar span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      animation: loadingMove 1.1s ease-in-out infinite;
    }

    @keyframes loaderFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(-4deg); }
    }

    @keyframes loadingMove {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }

    .bg-stage { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .blob { position: absolute; width: 360px; height: 360px; border-radius: 999px; filter: blur(86px); opacity: 0.23; animation: blobMove 13s ease-in-out infinite alternate; }
    .blob-one { top: 4%; left: -130px; background: var(--brand); }
    .blob-two { top: 18%; right: -130px; background: #ffd9a8; animation-delay: -3s; }
    .blob-three { bottom: -170px; left: 42%; background: #ffb27a; animation-delay: -6s; }
    
    .float-emoji { position: absolute; font-size: 44px; opacity: 0.16; animation: emojiFloat 8s ease-in-out infinite; }
    .float-emoji.one { top: 18%; left: 8%; }
    .float-emoji.two { top: 24%; right: 12%; animation-delay: -2s; }
    .float-emoji.three { bottom: 20%; left: 12%; animation-delay: -4s; }
    .float-emoji.four { bottom: 18%; right: 18%; animation-delay: -6s; }

    @keyframes blobMove { from { transform: translate3d(0, 0, 0) scale(1); } to { transform: translate3d(35px, 28px, 0) scale(1.08); } }
    @keyframes emojiFloat { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-18px) rotate(8deg); } }

    .site-header { position: sticky; top: 0; z-index: 30; background: rgba(255, 255, 255, 0.94); border-bottom: 1px solid var(--line); backdrop-filter: blur(18px); }
    .header-inner { width: min(1280px, calc(100% - 40px)); min-height: 78px; margin: 0 auto; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 28px; }
    .brand-text { display: inline-flex; align-items: center; gap: 10px; font-size: 32px; font-weight: 950; letter-spacing: -0.06em; }
    .brand-dot { width: 13px; height: 13px; border-radius: 999px; background: var(--brand); box-shadow: 0 0 0 7px rgba(244, 119, 33, 0.12); }
    .header-nav { display: flex; justify-content: center; gap: 8px; }
    .header-nav a { min-height: 42px; display: inline-flex; align-items: center; padding: 0 15px; border-radius: 999px; color: var(--muted); font-size: 14px; font-weight: 900; transition: all 0.18s ease; }
    .header-nav a.active { color: var(--brand-dark); background: var(--brand-light); }
    .header-nav a.disabled { opacity: 0.46; pointer-events: none; }
    .header-user { display: flex; align-items: center; gap: 14px; }
    .welcome-text { max-width: 240px; font-size: 14px; font-weight: 950; text-align: right; line-height: 1.25; }

    .outline-button, .primary-button, .soft-button, .primary-link, .course-action {
      min-height: 44px; border-radius: 999px; padding: 0 18px; border: 1px solid transparent; font-weight: 950; display: inline-flex; align-items: center; justify-content: center; transition: all 0.18s ease;
    }
    .outline-button { color: var(--ink); background: #ffffff; border-color: var(--line-2); }
    .soft-button { color: var(--brand-dark); background: var(--brand-light); border-color: rgba(244, 119, 33, 0.18); }
    .primary-button, .primary-link, .course-action { color: #ffffff; background: linear-gradient(135deg, var(--brand), #ff8a3d); box-shadow: 0 12px 28px rgba(244, 119, 33, 0.24); }
    .outline-button:hover, .primary-button:hover, .soft-button:hover { transform: translateY(-2px); }

    .page-shell { position: relative; z-index: 1; width: min(1280px, calc(100% - 40px)); margin: 0 auto; padding: 42px 0 72px; }
    .hero-section { display: grid; grid-template-columns: minmax(0, 1fr) 400px; gap: 28px; align-items: stretch; margin-bottom: 26px; }
    .hero-copy, .hero-panel { position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.74); border-radius: 40px; background: rgba(255, 255, 255, 0.84); box-shadow: var(--shadow); backdrop-filter: blur(18px); }
    .hero-copy { padding: 48px; }
    .hero-badge { width: fit-content; display: inline-flex; align-items: center; gap: 9px; min-height: 38px; padding: 0 15px; margin-bottom: 26px; border-radius: 999px; background: var(--brand-light); color: var(--brand-dark); font-size: 15px; font-weight: 950; }
    .hero-copy h1 { margin: 0 0 16px; font-size: clamp(40px, 5vw, 72px); line-height: 1.03; letter-spacing: -0.073em; }
    .hero-copy p { color: var(--muted); font-size: 18px; line-height: 1.75; font-weight: 700; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; }
    .hero-panel { padding: 30px; }
    .hero-panel-top { display: flex; gap: 14px; align-items: center; padding-bottom: 23px; border-bottom: 1px solid var(--line); }
    .hero-panel-icon { width: 58px; height: 58px; display: grid; place-items: center; border-radius: 21px; background: var(--brand-light); font-size: 30px; }
    .check-list { display: grid; gap: 13px; margin: 23px 0 0; padding: 0; list-style: none; color: var(--muted); font-size: 15px; font-weight: 850; }

    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .summary-card { min-height: 154px; display: flex; flex-direction: column; justify-content: space-between; padding: 23px; border: 1px solid var(--line); border-radius: 30px; background: var(--card); box-shadow: var(--shadow); transition: all 0.18s ease; }
    .summary-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-brand); }
    .summary-title { color: var(--ink); font-size: 21px; font-weight: 950; letter-spacing: -0.04em; }
    .summary-number { font-size: 58px; line-height: 0.85; font-weight: 950; letter-spacing: -0.06em; }
    .summary-icon { width: 48px; height: 48px; display: grid; place-items: center; border-radius: 18px; background: var(--brand-light); font-size: 24px; }
    .summary-card.success .summary-number { color: var(--green); }
    .summary-card.warning .summary-number { color: var(--red); }

    .toolbar-section { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 22px; }
    .filter-tabs { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-tabs button { min-height: 42px; border: 1px solid var(--line); border-radius: 999px; padding: 0 15px; background: #ffffff; color: var(--muted); font-weight: 950; }
    .filter-tabs button.active { color: var(--brand-dark); border-color: rgba(244, 119, 33, 0.28); background: var(--brand-light); }
    .search-box input { width: 350px; min-height: 46px; border: 1px solid var(--line-2); border-radius: 999px; padding: 0 18px; outline: none; font-weight: 850; }

    .course-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .course-card { padding: 24px; border: 1px solid var(--line); border-radius: 34px; background: #ffffff; box-shadow: var(--shadow); display: flex; flex-direction: column; transition: all 0.22s ease; }
    .course-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-brand); }
    .course-icon { width: 62px; height: 62px; display: grid; place-items: center; margin-bottom: 18px; border-radius: 24px; background: var(--brand-light); font-size: 30px; }
    .course-pill { display: inline-flex; align-items: center; min-height: 28px; padding: 0 10px; border-radius: 999px; font-size: 12px; font-weight: 950; background: #fafafa; border: 1px solid var(--line); }
    .course-pill.required { color: var(--brand-dark); background: var(--brand-light); }
    .course-progress-track { height: 11px; border-radius: 999px; background: #ececf3; overflow: hidden; margin-top: 10px; }
    .course-progress-fill { height: 100%; background: linear-gradient(135deg, var(--brand), #ff8a3d); }
    
    .user-modal { position: fixed; inset: 0; z-index: 80; display: grid; place-items: center; background: rgba(20, 20, 30, 0.42); backdrop-filter: blur(14px); }
    .user-box { width: min(560px, 100%); padding: 34px; border-radius: 34px; background: #ffffff; position: relative; }
    .user-form { display: grid; gap: 14px; margin-top: 22px; }
    .user-form input { height: 50px; border: 1px solid var(--line-2); border-radius: 17px; padding: 0 15px; width: 100%; }

    @media (max-width: 1120px) { .course-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 860px) { .course-grid { grid-template-columns: 1fr; } .hero-section { grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <div id="pageLoader" class="page-loader">
    <div class="loader-card">
      <div class="loader-mark">🚀</div>
      <h1>OneLearn을 준비하고 있어요</h1>
      <p>추천 과정과 학습 현황을 불러오는 중입니다.</p>
      <div class="loader-bar"><span></span></div>
    </div>
  </div>

  <div class="bg-stage" aria-hidden="true">
    <div class="blob blob-one"></div><div class="blob blob-two"></div><div class="blob blob-three"></div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand-text" href="#">OneLearn<span class="brand-dot"></span></a>
      <nav class="header-nav">
        <a class="active" href="#">🏠 내 과정</a>
        <a class="disabled" href="#">🏅 수료증</a>
      </nav>
      <div class="header-user">
        <strong id="welcomeText" class="welcome-text">방문자 님 어서오세요!</strong>
        <button id="logoutBtn" class="outline-button">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <section class="hero-section">
      <div class="hero-copy">
        <div class="hero-badge">✨ <strong>오늘도 멋지게 성장해볼까요?</strong></div>
        <h1 id="heroTitle">추천 과정을 확인하세요</h1>
        <p id="heroSubtitle">지금 필요한 학습을 한 곳에서 확인할 수 있습니다.</p>
        <div class="hero-actions">
          <a class="primary-link" href="#courseGrid">과정 목록 보기</a>
          <button id="openUserModalBtn" class="soft-button">내 정보 확인</button>
        </div>
      </div>
      <aside class="hero-panel">
        <div class="hero-panel-top">
          <span class="hero-panel-icon">📌</span>
          <div><strong>마감 임박 과정을 확인하세요</strong></div>
        </div>
        <ul class="check-list">
          <li>✅ 추천 과정 깔끔 표시</li>
          <li>📊 진행률 자동 반영</li>
        </ul>
      </aside>
    </section>

    <section class="summary-grid">
      <article class="summary-card"><div>추천 과정</div><strong id="totalCount" class="summary-number">0</strong></article>
      <article class="summary-card"><div>진행 중</div><strong id="inProgressCount" class="summary-number">0</strong></article>
      <article class="summary-card success"><div>수료 완료</div><strong id="completedCount" class="summary-number">0</strong></article>
      <article class="summary-card warning"><div>마감 임박</div><strong id="urgentCount" class="summary-number">0</strong></article>
    </section>

    <section class="toolbar-section">
      <div class="filter-tabs" id="filterTabs">
        <button class="active" data-filter="all">전체</button>
        <button data-filter="required">필수</button>
        <button data-filter="completed">수료 완료</button>
      </div>
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="과정명 검색" />
      </div>
    </section>

    <section id="courseGrid" class="course-grid"></section>
    <section id="emptyState" class="empty-state hidden">데이터가 없습니다.</section>
  </main>

  <div id="userModal" class="user-modal hidden">
    <div class="user-box">
      <button id="closeUserModalBtn" style="float:right">✕</button>
      <h2>수강자 정보 입력</h2>
      <form id="userForm" class="user-form">
        <input id="userNameInput" type="text" placeholder="이름" required />
        <input id="userEmailInput" type="email" placeholder="이메일" required />
        <button class="primary-button" type="submit">시작하기</button>
      </form>
    </div>
  </div>

  <script>
    const USER_KEY = "onelearn-user";
    const els = {
      loader: document.getElementById("pageLoader"),
      welcomeText: document.getElementById("welcomeText"),
      logoutBtn: document.getElementById("logoutBtn"),
      openUserModalBtn: document.getElementById("openUserModalBtn"),
      closeUserModalBtn: document.getElementById("closeUserModalBtn"),
      modal: document.getElementById("userModal"),
      form: document.getElementById("userForm"),
      name: document.getElementById("userNameInput"),
      email: document.getElementById("userEmailInput"),
      heroTitle: document.getElementById("heroTitle"),
      totalCount: document.getElementById("totalCount"),
      inProgressCount: document.getElementById("inProgressCount"),
      completedCount: document.getElementById("completedCount"),
      urgentCount: document.getElementById("urgentCount"),
      tabs: document.getElementById("filterTabs"),
      search: document.getElementById("searchInput"),
      grid: document.getElementById("courseGrid"),
      empty: document.getElementById("emptyState")
    };

    let user = null;
    let courses = [
      { courseId: "c1", title: "AI 스킬 트랜스포메이션", category: "스킬", required: true, progress: 40, dueDate: "2026-12-31" },
      { courseId: "c2", title: "법정의무교육", category: "법정", required: true, progress: 100, dueDate: "2026-06-30" }
    ];
    let activeFilter = "all";
    let searchQuery = "";

    function finishLoading() {
      setTimeout(() => { if(els.loader) els.loader.classList.add("done"); }, 600);
    }

    function loadUser() {
      const raw = localStorage.getItem(USER_KEY);
      return raw ? JSON.parse(raw) : null;
    }

    function renderDashboard() {
      const filtered = courses.filter(c => {
        const matchesSearch = c.title.includes(searchQuery);
        if (activeFilter === "required") return c.required && matchesSearch;
        if (activeFilter === "completed") return c.progress === 100 && matchesSearch;
        return matchesSearch;
      });

      els.totalCount.textContent = courses.length;
      els.completedCount.textContent = courses.filter(c => c.progress === 100).length;

      els.grid.innerHTML = filtered.map(c => `
        <article class="course-card">
          <div class="course-icon">📚</div>
          <div class="course-pill ${c.required ? 'required' : ''}">${c.category}</div>
          <h3>${c.title}</h3>
          <div class="course-progress-track">
            <div class="course-progress-fill" style="width:${c.progress}%"></div>
          </div>
          <p>진행률: ${c.progress}%</p>
          <button class="course-action">학습하기</button>
        </article>
      `).join('');
    }

    async function init() {
      user = loadUser();
      if (!user) {
        els.modal.classList.remove("hidden");
      } else {
        els.welcomeText.textContent = `${user.name} 님 환영합니다!`;
      }
      renderDashboard();
      finishLoading();
    }

    // Event Listeners
    els.tabs.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      activeFilter = btn.dataset.filter;
      els.tabs.querySelectorAll("button").forEach(b => b.classList.toggle("active", b === btn));
      renderDashboard();
    });

    els.search.addEventListener("input", (e) => {
      searchQuery = e.target.value;
      renderDashboard();
    });

    els.form.addEventListener("submit", (e) => {
      e.preventDefault();
      user = { name: els.name.value, email: els.email.value };
      localStorage.setItem(USER_KEY, JSON.stringify(user));
      els.modal.classList.add("hidden");
      els.welcomeText.textContent = `${user.name} 님 환영합니다!`;
    });

    els.logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(USER_KEY);
      location.reload();
    });

    els.openUserModalBtn.addEventListener("click", () => els.modal.classList.remove("hidden"));
    els.closeUserModalBtn.addEventListener("click", () => els.modal.classList.add("hidden"));

    init().catch(err => {
      console.error(err);
      finishLoading();
    });
  </script>
</body>
</html>
