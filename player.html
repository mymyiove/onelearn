<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>OneLearn 플레이어</title>

  <link rel="icon" href="./src/img/Favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="./src/css/common.css">
  <link rel="stylesheet" href="./src/css/player.css">
</head>

<body>

  <!-- Loader -->
  <div id="playerLoader" class="player-loader">
    <div class="loader-card">
      🎬
      <h1>플레이어 준비 중</h1>
    </div>
  </div>

  <!-- Header -->
  <header class="site-header player-header">
    <div class="header-inner">

      <a href="./dashboard.html?tenant=woongjin" class="brand-text">
        OneLearn <span class="brand-dot"></span>
      </a>

      <div class="header-spacer"></div>

      <div class="player-user">
        <strong id="welcomeText">확인 중</strong>

        <a id="dashboardBtn" href="#" class="outline-button">
          과정 목록
        </a>

        <button id="chapterDrawerBtn" class="hamburger" type="button">
          챕터
        </button>
      </div>

    </div>
  </header>

  <!-- MAIN -->
  <main class="player-shell">

    <!-- ✅ 과정 카드 -->
    <section class="course-hero glass-card">

      <div class="course-hero-main">

        <div class="course-hero-left">
          <h1 id="courseTitle">과정 불러오는 중</h1>

          <!-- ✅ 배지 (마감일 맨 앞) -->
          <div id="coursePolicyChips" class="course-policy-chips"></div>
        </div>

        <button id="courseDetailToggle" class="soft-button" type="button">
          자세히 >
        </button>

      </div>

      <!-- ✅ 상세 영역 -->
      <div id="courseDetailPanel" class="course-detail-panel hidden">

        <!-- 썸네일 -->
        <div id="courseThumbnailBox" class="course-thumbnail-box">
          <div class="course-thumbnail-fallback">
            <span>OneLearn</span>
            <strong>Learning Course</strong>
          </div>
        </div>

        <!-- 설명 -->
        <div class="course-detail-content">
          <p id="courseDesc">설명 불러오는 중</p>

          <div class="course-extra-grid">
            <div>
              <span>강사</span>
              <strong id="instructorText">-</strong>
            </div>
            <div>
              <span>마감일</span>
              <strong id="dueDateText">-</strong>
            </div>
            <div>
              <span>카테고리</span>
              <strong id="categoryText">-</strong>
            </div>
            <div>
              <span>완료 기준</span>
              <strong id="detailCompletionText">-</strong>
            </div>
          </div>
        </div>

      </div>

    </section>


    <!-- ✅ 메인 레이아웃 (2열) -->
    <section class="player-main">

      <!-- ✅ 좌측 (챕터 + 진행현황 통합) -->
      <aside id="chapterDrawer" class="chapter-panel glass-card">

        <button id="chapterDrawerClose" class="drawer-close">×</button>

        <div class="panel-head">
          <h2>📚 챕터</h2>
          <span id="chapterCountBadge">0개</span>
        </div>

        <!-- ✅ 전체 진행률 -->
        <div class="drawer-progress">
          <strong id="courseProgressText">0%</strong>
          <div class="mini-track">
            <i id="courseTrackFill"></i>
          </div>
          <p id="chapterProgressText">0 / 0 완료</p>
        </div>

        <div id="courseOutline" class="course-outline"></div>

      </aside>


      <!-- ✅ VIDEO -->
      <section class="video-panel glass-card">

        <!-- 챕터 정보 -->
        <div class="video-top">
          <h2 id="chapterTitle">챕터 제목</h2>
          <p id="chapterDesc">설명</p>
        </div>

        <!-- PLAYER -->
        <div id="playerStage" class="player-stage controls-visible">

          <div id="videoWrap" class="video-wrap">
            <video id="video" playsinline preload="metadata"></video>

            <div id="videoCenterHint" class="video-center-hint">▶</div>
          </div>

          <!-- ✅ 컨트롤 -->
          <div class="player-controls">

            <!-- ✅ 시간 + 챕터 이동 -->
            <div class="player-meta-row">

              <strong id="timeText">00:00 / 00:00 · 0%</strong>

              <div class="chapter-inline-nav">
                <button id="prevChapterControl">‹</button>
                <span id="chapterIndexText">1 / 1</span>
                <button id="nextChapterControl">›</button>
              </div>

            </div>

            <!-- 진행바 -->
            <div id="timeline" class="timeline">
              <span id="timelineFill"></span>
            </div>

            <!-- ✅ 컨트롤바 -->
            <div class="control-bar">

              <button id="playBtn" class="play-control">▶</button>

              <label class="rate-select">
                <select id="rateSelect">
                  <option value="0.75">0.75x</option>
                  <option value="1" selected>1x</option>
                  <option value="1.25">1.25x</option>
                  <option value="1.5">1.5x</option>
                  <option value="2">2x</option>
                </select>
              </label>

              <label class="volume-control">
                <input id="volumeInput" type="range" min="0" max="1" step="0.05" value="1">
              </label>

              <button id="ccBtn" class="icon-control">CC</button>

              <!-- ✅ 회전 버튼 (전체화면에서만 사용) -->
              <button id="rotateBtn" class="icon-control rotate-btn hidden">↻</button>

              <button id="fullscreenBtn" class="icon-control">⛶</button>

            </div>

          </div>

        </div>

      </section>

    </section>
  </main>


  <!-- ✅ 모달 -->
  <div id="confirmOverlay" class="confirm-overlay hidden">
    <section class="confirm-box">
      <h2>챕터 이동</h2>
      <p id="confirmText">이동하시겠습니까?</p>
      <div>
        <button id="confirmCancel">취소</button>
        <button id="confirmOk">이동</button>
      </div>
    </section>
  </div>

  <div id="identityModal" class="identity-modal hidden">
    <section class="identity-box">
      <h2>본인 확인</h2>
      <div id="identityCode">LEARN</div>
      <input id="identityInput" placeholder="입력">
      <button id="identitySubmitBtn">확인</button>
      <p id="identityMessage"></p>
    </section>
  </div>

  <script src="./src/js/config.js"></script>
  <script src="./src/js/storage.js"></script>
  <script src="./src/js/player.js"></script>

</body>
</html>
